# Custom
# custom module for jj status
[custom.jj]
description = "The current jj status"
when = "jj --ignore-working-copy root"
symbol = "­ƒÑï "
command = '''
jj log --revisions @ --no-graph --ignore-working-copy --color never --limit 1 --template '
  separate(" ",
    raw_escape_sequence("\x1b[1;31m") ++ change_id.shortest(),
    raw_escape_sequence("\x1b[1;35m") ++ bookmarks,
    concat(
      if(conflict, "­ƒÆÑ"),
      if(divergent, "­ƒÜº"),
      if(hidden, "­ƒæ╗"),
      if(immutable, "­ƒöÆ"),
    ),
    raw_escape_sequence("\x1b[1;97m") ++ if(empty, "(empty)"),
    raw_escape_sequence("\x1b[1;97m") ++ coalesce(
      truncate_end(29, description.first_line()),
      "(no description set)",
    ) ++ raw_escape_sequence("\x1b[0m"),
  )
'
'''
style="bg:color_aqua"
format = '[$symbol($output)]($style)'

# optionally disable git modules when JJ is found.
# note that you'll need to add ${custom.git_branch}, ${custom.git_commit} etc
# into format: https://starship.rs/config/#default-prompt-format
[custom.git_status]
when = "! jj --ignore-working-copy root"
command = "starship module git_status"
description = "Only show git_status if we're not in a jj repo"
format = '[$symbol($output)]($style)'

[custom.git_branch]
when = "! jj --ignore-working-copy root"
command = "starship module git_branch"
description = "Only show git_branch if we're not in a jj repo"
format = '[$symbol($output)]($style)'

[line_break]
disabled = false

